name: Sync Sub to Pages

on:
  schedule:
    - cron: "0 1 * * *"   # 北京时间每天 09:00 (UTC+8)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch from HF
        run: |
          curl -sL --max-time 60 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/plain,*/*" \
            -H "Accept-Language: en-US,en;q=0.9" \
            https://zhouzhouqingdao-basebar.hf.space/sub > sub.txt

          # 验证：非空且包含协议链接（明文输出）
          if [ ! -s sub.txt ]; then
            echo "HF returned empty"
            exit 1
          fi

          if grep -qE "^(vmess|vless|trojan|ss)://" sub.txt; then
            echo "HF OK, $(wc -l < sub.txt) lines"
          else
            echo "HF invalid content (likely blocked): $(head -c 300 sub.txt)"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
