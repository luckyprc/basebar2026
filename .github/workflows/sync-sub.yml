name: Sync Sub to Pages

on:
  schedule:
    - cron: "0 1 * * *"   # 北京时间每天 09:00 (UTC+8)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch from HF
        run: |
          curl -sL --max-time 60             https://zhouzhouqingdao-basebar.hf.space/sub > sub.txt

          # 验证：非空且包含协议链接（明文输出）
          if [ ! -s sub.txt ]; then
            echo "HF returned empty"
            exit 1
          fi

          if grep -qE "^(vmess|vless|trojan|ss)://" sub.txt; then
            echo "HF OK, $(wc -l < sub.txt) lines"
          else
            echo "HF invalid content: $(head -c 200 sub.txt)"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
